{% extends 'accounts/base.html' %}


{% block content %}
    <form action="{% url 'login' %}" method="post">
        {% csrf_token %}
        <p>Username:  <input type="text" name="username"></p>
        <p>Password:  <input type="text" name="password"></p>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
{% endblock %}
